<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Zafarjon Payariq metall — Mahsulotlar</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
         color: #e2e8f0; background:
           radial-gradient(900px 500px at 15% -10%, rgba(56,189,248,.10), transparent 60%),
           radial-gradient(800px 460px at 100% 0%, rgba(99,102,241,.10), transparent 55%),
           #0f172a; min-height: 100vh; padding: 26px; }
  header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  header img { width: 56px; height: 56px; border-radius: 14px; box-shadow: 0 10px 28px -8px rgba(0,0,0,.6); }
  header h1 { font-family: Georgia, serif; font-size: 24px; margin: 0; }
  header p { margin: 2px 0 0; color: #94a3b8; font-size: 13px; }
  .hd { display: flex; flex-direction: column; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: #7dd3fc; margin: 28px 0 12px; }
  model-viewer { width: 100%; height: 440px; background:
      radial-gradient(circle at 50% 40%, #1e293b, #0f172a 70%); border-radius: 18px;
      border: 1px solid #1e293b; box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
  .hint { text-align: center; color: #64748b; font-size: 12px; margin-top: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .card { background: #1e293b; border: 1px solid #273449; border-radius: 16px; overflow: hidden;
          box-shadow: 0 14px 34px -14px rgba(0,0,0,.6); transition: transform .2s ease, box-shadow .2s ease; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 20px 44px -14px rgba(0,0,0,.7); }
  .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #f5f7fb; }
  .card .name { padding: 11px 14px; font-weight: 600; font-size: 14px; }
  .card .name span { display: block; color: #94a3b8; font-size: 11px; font-weight: 400; margin-top: 1px; }
</style>
</head>
<body>
  <header>
    <img src="/icon-512.png" alt="Logo" />
    <div class="hd">
      <h1>Zafarjon Payariq metall</h1>
      <p>Mahsulotlar — render va 3D</p>
    </div>
  </header>

  <h2>🧊 3D model — aylantiring (sichqoncha bilan)</h2>
  <model-viewer src="/products/truba-3d.glb" camera-controls auto-rotate auto-rotate-delay="0"
    rotation-per-second="24deg" shadow-intensity="1" exposure="1.15" environment-image="neutral"
    camera-orbit="35deg 75deg 105%"></model-viewer>
  <div class="hint">Truba — bosib turib aylantiring, g'ildirakcha bilan kattalashtiring</div>

  <h2>🖼️ Mahsulot renderlari</h2>
  <div class="grid">
    <div class="card"><img src="/products/konyok.png" alt="Konyok" /><div class="name">Konyok<span>Tom konyogi</span></div></div>
    <div class="card"><img src="/products/latok.png" alt="Latok" /><div class="name">Latok<span>Yomg'ir novchasi</span></div></div>
    <div class="card"><img src="/products/profnastil.png" alt="Profnastil" /><div class="name">Profnastil<span>Profilli list</span></div></div>
    <div class="card"><img src="/products/truba.png" alt="Truba" /><div class="name">Truba<span>Po'lat quvur</span></div></div>
  </div>
</body>
</html>
